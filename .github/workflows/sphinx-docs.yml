    .tag-sphinx{background:var(--brand);}
    .tag-java{background:var(--orange);}
    .tag-test{background:var(--green);}
    .tag-quality{background:var(--purple);}
    .tag-perf{background:var(--teal);}
    .tag-doxygen{background:#c0392b;}
    footer{text-align:center;padding:2rem;font-size:.82rem;
           color:var(--muted);border-top:1px solid var(--border);}
  </style>
</head>
<body>
