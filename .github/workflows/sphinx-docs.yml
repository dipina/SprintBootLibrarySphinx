name: Build and Deploy Sphinx Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sphinx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('docs-sphinx/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Sphinx and extensions
        run: pip install -r docs-sphinx/requirements.txt

      - name: Build Sphinx HTML
        run: |
          cd docs-sphinx
          make html

      - name: Build Sphinx PDF (no LaTeX required)
        run: |
          pip install rst2pdf
          cd docs-sphinx
          sphinx-build -b pdf source _build/pdf
        continue-on-error: true

      - name: Assemble deployment directory
        run: |
          mkdir -p deploy/sphinx

          # Prevent GitHub Pages from running Jekyll
          touch deploy/.nojekyll

          # Copy full Sphinx HTML build
          cp -r docs-sphinx/_build/html/. deploy/sphinx/

          # Copy PDF if it was built successfully
          PDF=$(ls docs-sphinx/_build/pdf/*.pdf 2>/dev/null | head -1)
          if [ -n "$PDF" ]; then
            cp "$PDF" deploy/sphinx/SprintBootLibrarySphinx.pdf
          fi

          # Write landing page inline.
          # docs/ is listed in .gitignore so it is never present in the
          # CI checkout — the file must be generated here, not copied.
          #
          # Verified path map (matches pom.xml post-site copy executions):
          #   sphinx/              → this workflow (destination_dir: .)
          #   site/                → maven-site-integration.yml (docs/site → destination_dir: .)
          #   site/apidocs/        → maven-javadoc-plugin in <reporting>
          #   site/jacoco/         → jacoco:report
          #   site/surefire.html   → surefire-report-plugin report-only goal
          #   site/reports/perf-report.html → performance profile copy-perf-report execution
          #   site/checkstyle.html → maven-checkstyle-plugin
          #   site/pmd.html        → maven-pmd-plugin
          #   site/cpd.html        → maven-pmd-plugin CPD
          #   site/jdepend-report.html → jdepend-maven-plugin
          #   doxygen/html/        → doxygen-maven-plugin (docs/doxygen → destination_dir: .)
          cat > deploy/index.html << 'HTMLEOF'
