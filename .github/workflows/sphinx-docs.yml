name: Build and Deploy Sphinx Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sphinx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('docs-sphinx/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Sphinx and extensions
        run: pip install -r docs-sphinx/requirements.txt

      - name: Build Sphinx HTML
        run: |
          cd docs-sphinx
          make html

      - name: Build Sphinx PDF (no LaTeX required)
        run: |
          pip install rst2pdf
          cd docs-sphinx
          sphinx-build -b pdf source _build/pdf
        continue-on-error: true

      - name: Assemble deployment directory
        run: |
          mkdir -p deploy/sphinx
          touch deploy/.nojekyll
          cp -r docs-sphinx/_build/html/. deploy/sphinx/
          PDF=$(ls docs-sphinx/_build/pdf/*.pdf 2>/dev/null | head -1)
          if [ -n "$PDF" ]; then
            cp "$PDF" deploy/sphinx/SprintBootLibrarySphinx.pdf
          fi

      - name: Write landing page
        run: echo '' | base64 -d > deploy/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          destination_dir: .
          keep_files: true
          enable_jekyll: false
