                   color:var(--muted);margin:2.5rem 0 1rem;
                   border-bottom:2px solid var(--border);padding-bottom:.4rem;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;}
    .card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;
          padding:1.4rem 1.5rem;text-decoration:none;color:inherit;
          display:flex;flex-direction:column;gap:.5rem;
          transition:transform .15s,box-shadow .15s,border-color .15s;}
    .card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.1);
                border-color:var(--brand);}
    .card-icon{font-size:1.8rem;line-height:1;}
    .card-title{font-weight:700;font-size:1.05rem;}
    .card-desc{font-size:.88rem;color:var(--muted);line-height:1.5;}
    .card-tag{display:inline-block;font-size:.72rem;font-weight:600;padding:.15rem .55rem;
